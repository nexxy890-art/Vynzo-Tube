<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vynzo-Tube</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
}
header{
background:#202020;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}
.container{
padding:20px;
max-width:900px;
margin:auto;
}
video{
width:100%;
border-radius:10px;
background:black;
}
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#1f1f1f;
color:white;
border:1px solid #333;
border-radius:8px;
}
button{
margin-top:10px;
padding:12px;
width:100%;
background:red;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}
</style>
</head>
<body>

<header>🎥 Vynzo-Tube</header>

<div class="container">
<h2>Upload Video</h2>

<input type="file" accept="video/*">
<input type="text" placeholder="Video Title">
<textarea placeholder="Video Caption"></textarea>

<button>Upload</button>

<h2 style="margin-top:30px;">Latest Video</h2>

<video controls>
<source src="" type="video/mp4">
</video>

</div>

</body>
  </html>
