<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Stream</title>
    <style>
        /* Modern Glassmorphism Style */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #121212, #1f1f1f); 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 500px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        h2 { text-align: center; color: #00d4ff; letter-spacing: 2px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); 
            border: 1px solid #444; border-radius: 12px; color: #fff; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: linear-gradient(90deg, #00d4ff, #89f7fe); 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000;
        }
        .video-box { 
            margin-top: 25px; border-radius: 15px; overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>VYNZO STREAM</h2>
    <input type="text" id="link" placeholder="Paste YouTube Link Here...">
    <button onclick="play()">WATCH NOW</button>

    <div class="video-box">
        <div id="player" style="height: 250px; background: #000; display:flex; align-items:center; justify-content:center;">
            <span style="color: #555;">Waiting for link...</span>
        </div>
    </div>
</div>

<script>
    function play() {
        let input = document.getElementById('link').value.trim();
        input = input.replace(/\[|\]|\(|\)/g, "").split(" ")[0];
        
        let id = "";
        if (input.includes("v=")) id = input.split("v=")[1].split("&")[0];
        else if (input.includes("youtu.be/")) id = input.split("youtu.be/")[1].split("?")[0];
        else if (input.includes("shorts/")) id = input.split("shorts/")[1].split("?")[0];

        if(id) {
            document.getElementById('player').innerHTML = `<iframe width="100%" height="250" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        } else {
            alert("Invalid Link! Please try again.");
        }
    }
</script>

</body>
</html>
