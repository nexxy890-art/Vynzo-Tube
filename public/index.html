<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>
    <link rel="icon" type="image/png" href="/1784284331252.png">
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ff0000; margin-bottom: 20px; }
        .container { width: 100%; max-width: 500px; background-color: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; background-color: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #ff0000; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #videoDisplay { width: 100%; max-width: 500px; display: none; background-color: #1e1e1e; border-radius: 10px; overflow: hidden; margin-bottom: 50px; }
        .video-wrapper { position: relative; width: 100%; background-color: #000; }
        .video-wrapper iframe, .video-wrapper video { width: 100%; display: block; }
        .controls { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .like-btn { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .like-btn.liked { background: #ff0000; color: #fff; }
        .download-btn { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .comments-section { padding: 15px; }
        .comment-item { background: #2a2a2a; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>🎥 Vynzo-Tube</h1>

    <div class="container">
        <input type="text" id="videoLink" placeholder="Paste Video URL (YouTube, TikTok, MP4)...">
        <input type="text" id="videoTitle" placeholder="Video Title...">
        <textarea id="videoDesc" placeholder="Description..." rows="2"></textarea>
        <button onclick="displayVideo()">Show Video</button>
    </div>

    <div id="videoDisplay">
        <div id="playerContainer" class="video-wrapper"></div>
        <div class="controls">
            <button class="like-btn" id="likeButton" onclick="toggleLike()">👍🏻 <span id="likeCount">0</span></button>
            <button class="download-btn" onclick="downloadVideo()">Download</button>
        </div>
        <div class="comments-section">
            <h4>Comments</h4>
            <input type="text" id="commenterName" placeholder="Name...">
            <textarea id="commentText" placeholder="Comment..."></textarea>
            <button onclick="postComment()">Post</button>
            <div id="commentsList" style="margin-top:15px;"></div>
        </div>
    </div>

    <script>
        let currentVideoLink = "";
        let currentKey = "";

        function displayVideo() {
            const link = document.getElementById('videoLink').value.trim();
            if (!link) return alert("Enter link!");
            
            currentVideoLink = link;
            currentKey = btoa(link).replace(/=/g, "");
            const container = document.getElementById('playerContainer');
            
            let html = "";
            if (link.includes("youtube.com") || link.includes("youtu.be")) {
                let id = link.includes("v=")? link.split("v=")[1].split("&")[0] : link.split("youtu.be/")[1];
                html = `<iframe height="280" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
            } else if (link.includes("tiktok.com")) {
                let id = link.match(/\/video\/(\d+)/)[1];
                html = `<iframe height="500" src="https://www.tiktok.com/embed/v2/${id}" frameborder="0"></iframe>`;
            } else {
                html = `<video id="myVideo" height="280" controls playsinline><source src="${link}" type="video/mp4"></video>`;
            }

            container.innerHTML = html;
            document.getElementById('videoDisplay').style.display = 'block';
            
            // Double Tap Logic for MP4 only
            if (!html.includes("iframe")) {
                const vid = document.getElementById('myVideo');
                let lastTap = 0;
                vid.addEventListener('touchend', (e) => {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 300 && tapLength > 0) {
                        const rect = vid.getBoundingClientRect();
                        const x = e.changedTouches[0].clientX - rect.left;
                        if (x < rect.width / 2) vid.currentTime -= 10; // Left: -10s
                        else vid.currentTime += 10; // Right: +10s
                    }
                    lastTap = currentTime;
                });
            }
            loadData();
        }

        function toggleLike() {
            let likes = parseInt(localStorage.getItem(`likes_${currentKey}`)) || 0;
            let liked = localStorage.getItem(`liked_${currentKey}`) === "true";
            
            if (!liked) { likes++; localStorage.setItem(`liked_${currentKey}`, "true"); }
            else { likes = Math.max(0, likes - 1); localStorage.setItem(`liked_${currentKey}`, "false"); }
            
            localStorage.setItem(`likes_${currentKey}`, likes);
            updateUI();
        }

        function downloadVideo() {
            const a = document.createElement('a');
            a.href = currentVideoLink;
            a.download = 'vynzo-video.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function postComment() {
            const name = document.getElementById('commenterName').value || "User";
            const text = document.getElementById('commentText').value;
            if(!text) return;
            const comments = JSON.parse(localStorage.getItem(`comm_${currentKey}`)) || [];
            comments.unshift({name, text});
            localStorage.setItem(`comm_${currentKey}`, JSON.stringify(comments));
            updateUI();
        }

        function updateUI() {
            document.getElementById('likeCount').innerText = localStorage.getItem(`likes_${currentKey}`) || 0;
            const liked = localStorage.getItem(`liked_${currentKey}`) === "true";
            document.getElementById('likeButton').className = liked ? "like-btn liked" : "like-btn";
            
            const list = document.getElementById('commentsList');
            list.innerHTML = (JSON.parse(localStorage.getItem(`comm_${currentKey}`)) || []).map(c => 
                `<div class="comment-item"><b>${c.name}</b>: ${c.text}</div>`).join('');
        }
        
        function loadData() { updateUI(); }
    </script>
</body>
</html>
