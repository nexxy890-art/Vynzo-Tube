<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube | Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f0f; color: #fff; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1a; }
        #profileIcon { width: 40px; height: 40px; border-radius: 50%; background: #444; cursor: pointer; border: 2px solid #ff0000; object-fit: cover; }
        .main-container { padding: 20px; max-width: 600px; margin: auto; }
        .video-box { width: 100%; background: #1e1e1e; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .player { width: 100%; background: #000; position: relative; }
        .recommendations { padding: 20px 0; }
        .scroll-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .rec-card { min-width: 140px; cursor: pointer; }
        .rec-card img { width: 100%; border-radius: 8px; }
        .rec-card p { font-size: 12px; margin-top: 5px; color: #ccc; }
        .comment-box { padding: 20px; background: #1e1e1e; border-radius: 12px; }
        .comment-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px; }
        .avatar-small { width: 35px; height: 35px; border-radius: 50%; }
    </style>
</head>
<body>

<header>
    <h2 style="color:#ff0000; margin:0;">🎥 Vynzo-Tube</h2>
    <img id="profileIcon" src="https://via.placeholder.com/100" onclick="openProfile()">
</header>

<div class="main-container">
    <div id="playerContainer" class="video-box"></div>
    
    <div class="comment-box">
        <h3>Comments</h3>
        <input type="text" id="commentText" placeholder="Write a comment..." style="width:100%; padding:10px; border-radius:5px; margin-bottom:10px;">
        <button onclick="postComment()" style="padding:10px; background:#ff0000; border:none; color:white; width:100%;">Post</button>
        <div id="commentsList" style="margin-top:20px;"></div>
    </div>

    <div class="recommendations">
        <h3>Trending Videos</h3>
        <div class="scroll-grid" id="recGrid"></div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" style="display:none; position:fixed; top:20%; background:#222; padding:20px; border-radius:10px; width:80%; left:10%;">
    <input type="text" id="newName" placeholder="Enter Name">
    <input type="file" id="newImg" accept="image/*">
    <button onclick="saveProfile()">Save Profile</button>
</div>

<script>
    const videos = [
        {title: "Funny Gaming", thumb: "https://img.youtube.com/vi/kffacxfA7G4/0.jpg", url: "https://www.youtube.com/watch?v=kffacxfA7G4"},
        {title: "Cartoons", thumb: "https://img.youtube.com/vi/67xV1O-Z_1s/0.jpg", url: "https://www.youtube.com/watch?v=67xV1O-Z_1s"},
        {title: "Latest Song", thumb: "https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"}
    ];

    function renderRecs() {
        const grid = document.getElementById('recGrid');
        grid.innerHTML = videos.map(v => `
            <div class="rec-card" onclick="loadVideo('${v.url}')">
                <img src="${v.thumb}">
                <p>${v.title}</p>
            </div>
        `).join('');
    }

    function loadVideo(url) {
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<iframe width="100%" height="280" src="https://www.youtube.com/embed/${url.split('v=')[1]}" allowfullscreen></iframe>`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openProfile() { document.getElementById('profileModal').style.display = 'block'; }
    
    function saveProfile() {
        const name = document.getElementById('newName').value;
        const file = document.getElementById('newImg').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem('uname', name);
            localStorage.setItem('uimg', e.target.result);
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function postComment() {
        const text = document.getElementById('commentText').value;
        const name = localStorage.getItem('uname') || 'Guest';
        const img = localStorage.getItem('uimg') || 'https://via.placeholder.com/100';
        const comments = JSON.parse(localStorage.getItem('comments') || '[]');
        comments.unshift({name, img, text});
        localStorage.setItem('comments', JSON.stringify(comments));
        document.getElementById('commentText').value = '';
        renderComments();
    }

    function renderComments() {
        const list = document.getElementById('commentsList');
        const comments = JSON.parse(localStorage.getItem('comments') || '[]');
        list.innerHTML = comments.map(c => `
            <div class="comment-item">
                <img class="avatar-small" src="${c.img}">
                <div><b>${c.name}</b><br>${c.text}</div>
            </div>
        `).join('');
    }

    // Init
    document.getElementById('profileIcon').src = localStorage.getItem('uimg') || 'https://via.placeholder.com/100';
    renderRecs();
    renderComments();
</script>
</body>
</html>
