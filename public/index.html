        /* Comment Box Section */

        .comment-input-area button {

        .avatar-small {

        .comment-content {

        .comment-user-name {

        }
        .comment-text {
            font-size: 14px;

            word-break: break-all;
        }

        /* Recommendations Section (Horizontal Scroll) */
        .recommendations {

        .scroll-grid {

        /* Fullscreen Profile Page Overlay (Fixed Layout) */

            display: flex;
            align-items: center;

        }
        .profile-header h2 {
            margin: 0;
            margin-left: 15px;
            font-size: 20px;
        }
        .profile-editor-card {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #profilePreview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #444;
            border: 3px solid #ff0000;
            object-fit: cover;
            margin-bottom: 20px;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-upload {
            border: 1px solid #ff0000;
            color: #ff0000;

            cursor: pointer;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;

        }
        .profile-editor-card input[type=text] {
            width: 100%;

            background-color: #2a2a2a;

        }
        .save-profile-btn {
            width: 100%;
            padding: 14px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

<body>

<!-- Global Header -->
<header>
    <h2>🎥 Vynzo-Tube</h2>
    <div class="profile-btn-container" onclick="openProfilePage()">
        <img id="profileIcon" src="" alt="Profile">
    </div>
</header>

<div class="main-container">

    <!-- 1. Input Section -->
    <div class="input-card">
        <h3>🔗 Custom Video Player</h3>
        <input type="text" id="videoLink" placeholder="Paste YouTube, TikTok, or Direct MP4 link...">
        <input type="text" id="videoTitle" placeholder="Video Title...">
        <textarea id="videoDesc" placeholder="Video Description..." rows="2"></textarea>
        <button onclick="displayVideoFromInput()">Show Video</button>
    </div>

    <!-- 2. Video Player Section -->
    <div id="videoDisplay" class="video-box">
        <div id="playerContainer" class="player-wrapper">
            <p id="placeholderText" style="color: #ccc; font-size: 14px; text-align: center; padding: 20px;">Paste a link or select a trending video below to start playing!</p>
        </div>
        <div class="video-details">
            <h4 id="displayTitle">No Video Loaded</h4>
            <p id="displayDesc">Please select or paste a video link above.</p>
        </div>
        <!-- Like & Download System -->
        <div class="interaction-bar">
            <button class="action-btn like-btn" id="likeButton" onclick="toggleLike()">
                👍🏻 <span id="likeCount">0</span> Likes
            </button>
            <button class="action-btn download-btn" onclick="downloadVideo()">
                📥 Download
            </button>
        </div>
    </div>
    
    <!-- 3. Comments Section -->
    <div class="comment-box">
        <h3>Comments</h3>
        <div class="comment-input-area">
            <textarea id="commentText" placeholder="Share your thoughts about this video..." rows="2"></textarea>
            <button onclick="postComment()">Post Comment</button>
        </div>
        <div id="commentsList">
            <!-- Comments -->
        </div>
    </div>

    <!-- 4. Trending Horizontal Scroll -->
    <div class="recommendations">
        <h3>Trending Videos</h3>
        <div class="scroll-grid" id="recGrid"></div>
    </div>
</div>

<!-- 5. Fullscreen Profile Edit Page (Back Button Included!) -->
<div id="profilePage">
    <div class="profile-header">
        <button class="back-nav-btn" onclick="closeProfilePage()">← Back</button>
        <h2>Manage Profile</h2>
    </div>
    <div class="profile-editor-card">
        <img id="profilePreview" src="" alt="Preview">
        
        <div class="upload-btn-wrapper">
            <button class="btn-upload">Change Photo</button>
            <input type="file" id="newImg" accept="image/*" onchange="previewImage(this)">
        </div>
        
        <input type="text" id="newName" placeholder="Enter your name...">
        <button class="save-profile-btn" onclick="saveProfile()">Save Changes</button>
    </div>
</div>

<script>
    // Bulletproof Offline Safe SVG Avatar - Never Fails or Crashes
    const defaultAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff0000"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6.1 0-11 2.9-11 6v2h22v-2c0-3.1-4.9-6-11-6z"/></svg>';

    const videos = [
        {
            title: "Tonde Gamer - Live FF Gameplay", 
            thumb: "https://img.youtube.com/vi/6gR4fOqas74/0.jpg", 
            url: "https://www.youtube.com/watch?v=6gR4fOqas74",
            desc: "Best Free Fire gameplay edit by Tonde Gamer. Check out these crazy headshots!",
            category: "Gaming"
        },
        {
            title: "T-Series - Latest Hit Song", 
            thumb: "https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg", 
            url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
            desc: "Official music track presented by T-Series.",
            category: "Music"
        },
        {
            title: "Funny Cartoon Show", 
            thumb: "https://img.youtube.com/vi/67xV1O-Z_1s/0.jpg", 
            url: "https://www.youtube.com/watch?v=67xV1O-Z_1s",
            desc: "Super funny animated cartoon episode for children and family.",
            category: "Cartoon"
        }
    ];

    let currentVideoLink = "";
    let currentKey = "";

    function renderRecs() {
        const grid = document.getElementById('recGrid');
        grid.innerHTML = videos.map(v => `
            <div class="rec-card" onclick="loadVideo('${v.url}', '${v.title.replace(/'/g, "\\'")}', '${v.desc.replace(/'/g, "\\'")}')">
                <img src="${v.thumb}" alt="thumbnail">
                <div class="rec-card-info">
                    <p>${v.title}</p>
                    <span>${v.category}</span>
                </div>
            </div>
        `).join('');
    }

    function displayVideoFromInput() {
        const link = document.getElementById('videoLink').value.trim();
        const title = document.getElementById('videoTitle').value.trim() || "Custom Video";
        const desc = document.getElementById('videoDesc').value.trim() || "No description provided.";
        
        if (!link) return alert("Please paste a video link first!");
        loadVideo(link, title, desc);
    }

    function loadVideo(url, title, desc) {
        currentVideoLink = url;
        // Super Safe Key replacement that never throws a JavaScript error
        currentKey = url.replace(/[^a-zA-Z0-9]/g, "").slice(-50); 
        
        const container = document.getElementById('playerContainer');
        let html = "";
        
        if (url.includes("youtube.com") || url.includes("youtu.be")) {
            let id = "";
            if (url.includes("v=")) {
                id = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                id = url.split("youtu.be/")[1].split("?")[0];
            }
            html = `<iframe height="280" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else if (url.includes("tiktok.com")) {
            let match = url.match(/\/video\/(\d+)/);
            if (match && match[1]) {
                html = `<iframe height="500" src="https://www.tiktok.com/embed/v2/${match[1]}" frameborder="0" allow="fullscreen"></iframe>`;
            } else {
                alert("Invalid TikTok link format.");
                return;
            }
        } else {
            html = `<video id="myVideo" height="280" controls playsinline autoplay><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video>`;
        }

        container.innerHTML = html;
        document.getElementById('displayTitle').innerText = title;
        document.getElementById('displayDesc').innerText = desc;

        if (!html.includes("iframe")) {
            const vid = document.getElementById('myVideo');
            let lastTap = 0;
            vid.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    const rect = vid.getBoundingClientRect();
                    const x = e.changedTouches[0].clientX - rect.left;
                    if (x < rect.width / 2) {
                        vid.currentTime = Math.max(0, vid.currentTime - 10); 
                    } else {
                        vid.currentTime = Math.min(vid.duration, vid.currentTime + 10); 
                    }
                }
                lastTap = currentTime;
            });
        }

        window.scrollTo({top: 0, behavior: 'smooth'});
        loadInteractions();
    }

    function openProfilePage() {
        document.getElementById('newName').value = localStorage.getItem('uname') || '';
        document.getElementById('profilePreview').src = localStorage.getItem('uimg') || defaultAvatar;
        document.getElementById('profilePage').style.display = 'flex';
    }

    function closeProfilePage() {
        document.getElementById('profilePage').style.display = 'none';
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profilePreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveProfile() {
        const name = document.getElementById('newName').value.trim() || 'User';
        const previewSrc = document.getElementById('profilePreview').src;
        
        localStorage.setItem('uname', name);
        localStorage.setItem('uimg', previewSrc);
        
        document.getElementById('profileIcon').src = previewSrc;
        closeProfilePage();
        renderComments(); 
    }

    function loadInteractions() {
        if (!currentKey) return;
        
        const likes = parseInt(localStorage.getItem(`likes_${currentKey}`)) || 0;
        document.getElementById('likeCount').innerText = likes;

        const liked = localStorage.getItem(`liked_${currentKey}`) === "true";
        const btn = document.getElementById('likeButton');
        if (liked) {
            btn.classList.add('liked');
        } else {
            btn.classList.remove('liked');
