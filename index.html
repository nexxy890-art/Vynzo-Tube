<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>

    <style>
        @keyframes neonRainbow {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            20% { border-color: #ff9900; box-shadow: 0 0 15px #ff9900; }
            40% { border-color: #33cc33; box-shadow: 0 0 15px #33cc33; }
            60% { border-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
            80% { border-color: #cc00ff; box-shadow: 0 0 15px #cc00ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        @keyframes bgNeonMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body {
            margin: 0;
            padding: 40px 20px 60px 20px;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #ffffff;
            background: linear-gradient(135deg, #05000a, #001a1a, #1a001a, #05000a);
            background-size: 400% 400%;
            animation: bgNeonMove 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Ping Indicator Top-Right */
        .ping-indicator {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-container {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        /* YouTube Video Search Bar with Neon Rainbow Box */
        .top-search-container {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            gap: 8px;
        }
        .top-search-container input {
            flex: 1;
            padding: 14px 18px;
            font-size: 14px;
            animation: neonRainbow 6s infinite;
            border: 2px solid #ff0000;
            border-radius: 14px;
            background-color: rgba(18, 18, 18, 0.95);
            color: #fff;
            outline: none;
        }
        .top-search-container button {
            padding: 14px 22px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        h1 {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }
        h1 span {
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000;
        }
        p {
            color: #bbb;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #111;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            animation: neonRainbow 6s infinite;
            border: 2px solid #33cc33;
            margin-bottom: 25px;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 3;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 4;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-custom {
            background: #1c1c1c;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .like-btn.liked {
            background: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .visitor-counter {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(18, 18, 18, 0.9);
            animation: neonRainbow 6s infinite;
            border: 2px solid #00f0ff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 14px;
            color: #fff;
        }
        .visitor-counter span {
            color: #00f0ff;
            font-weight: bold;
        }

        /* Clean 5-Star Rating Section */
        .rating-section {
            width: 100%;
            background: rgba(18, 18, 18, 0.95);
            animation: neonRainbow 6s infinite;
            border: 2px solid #ff9900;
            padding: 15px;
            border-radius: 16px;
            box-sizing: border-box;
            text-align: center;
        }
        .rating-section h4 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #ff9900;
        }
        .stars-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 6px;
        }
        .star {
            color: #222;
            -webkit-text-stroke: 1px #777;
            transition: transform 0.2s;
        }
        .star.active {
            color: #ffcc00;
            -webkit-text-stroke: 1px #cca300;
            text-shadow: 0 0 10px #ffcc00;
            transform: scale(1.1);
        }
        .rating-info {
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

    <!-- Ping Indicator Top-Right -->
    <div class="ping-indicator" id="pingIndicator">
        <span id="pingIcon">📶</span>
        <span id="pingText" style="color: #ffffff;">-- ms</span>
    </div>

    <div class="main-container">
        <div class="top-search-container">
            <input type="text" id="videoUrl" placeholder="YouTube video link ya ID search karein...">
            <button onclick="playVideoFromInput()">Search</button>
        </div>

        <h1>Vynzo<span>-Tube</span></h1>
        <p>Smooth Cinematic Neon Experience</p>

        <div class="video-wrapper" id="wrapper" style="display:none;">
            <div class="video-box" id="videoContainer">
                <div class="loader" id="videoLoader"></div>
            </div>
            
            <div class="action-bar">
                <button class="btn-custom like-btn" id="likeBtn" onclick="toggleLike()">
                    ❤️ Like <span id="likeCount">0</span>
                </button>
                <button class="btn-custom" onclick="shareVideo()">
                    🔗 Share Link
                </button>
                <button class="btn-custom" onclick="downloadVideo()">
                    📥 Download
                </button>
            </div>
        </div>

        <div class="visitor-counter">
            🎭 Total Visitors: <span id="visitCount">1</span>
        </div>

        <!-- Clean 5-Star Rating Box -->
        <div class="rating-section">
            <h4>⭐ Website ko Rate Karein</h4>
            <div class="stars-container" id="starsContainer">
                <span class="star" onclick="rateWebsite(1)">★</span>
                <span class="star" onclick="rateWebsite(2)">★</span>
                <span class="star" onclick="rateWebsite(3)">★</span>
                <span class="star" onclick="rateWebsite(4)">★</span>
                <span class="star" onclick="rateWebsite(5)">★</span>
            </div>
            <div class="rating-info">Average: <span id="avgRating">4.8</span>/5 (<span id="totalVotes">14</span> votes)</div>
        </div>
    </div>

    <script>
        let currentVideoID = "";
        let isLiked = false;

        window.onload = function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let vParam = urlParams.get('v');
                if (vParam) {
                    playVideo(vParam);
                    let vInput = document.getElementById("videoUrl");
                    if(vInput) vInput.value = "https://youtu.be/" + vParam;
                }

                let visitKey = 'vynzo_visit_counted_session';
                let visits = parseInt(localStorage.getItem('vynzo_visit_total') || '124');
                if (!sessionStorage.getItem(visitKey)) {
                    visits += 1;
                    localStorage.setItem('vynzo_visit_total', visits);
                    sessionStorage.setItem(visitKey, 'true');
                }
                let visitSpan = document.getElementById("visitCount");
                if(visitSpan) visitSpan.innerText = visits;

                loadRatingData();
                updatePing();
                setInterval(updatePing, 4000);
            } catch(e) {}
        };

        // Real Fast Ping Checker
        function updatePing() {
            let pingText = document.getElementById("pingText");
            let pingIcon = document.getElementById("pingIcon");
            if (!pingText) return;

            if (!navigator.onLine) {
                pingText.innerText = "Offline";
                pingText.style.color = "#ff0000";
                if(pingIcon) pingIcon.innerText = "⚠️";
                return;
            }

            let startTime = Date.now();
            let img = new Image();
            img.onload = function() {
                let duration = Date.now() - startTime;
                pingText.innerText = duration + "ms";
                if(pingIcon) pingIcon.innerText = "📶";
                if (duration < 250) {
                    pingText.style.color = "#ffffff";
                } else {
                    pingText.style.color = "#ffff00";
                }
            };
            img.onerror = function() {
                let duration = Date.now() - startTime;
                pingText.innerText = duration + "ms";
                if(pingIcon) pingIcon.innerText = "📶";
                pingText.style.color = "#ffffff";
            };
            img.src = "https://www.google.com/favicon.ico?t=" + startTime;
        }

        // Star Rating Logic via LocalStorage
        function rateWebsite(stars) {
            let savedRatings = JSON.parse(localStorage.getItem('vynzo_ratings_data') || '{"totalScore": 67, "votes": 14}');
            let userVoted = localStorage.getItem('vynzo_user_voted');

            if (!userVoted) {
                savedRatings.totalScore += stars;
                savedRatings.votes += 1;
                localStorage.setItem('vynzo_user_voted', stars);
                localStorage.setItem('vynzo_ratings_data', JSON.stringify(savedRatings));
                alert("Shukriya! Aapki rating save ho gayi hai ⭐");
            } else {
                let oldStars = parseInt(userVoted);
                savedRatings.totalScore = savedRatings.totalScore - oldStars + stars;
                localStorage.setItem('vynzo_user_voted', stars);
                localStorage.setItem('vynzo_ratings_data', JSON.stringify(savedRatings));
                alert("Aapki rating update ho gayi hai! ⭐");
            }

            loadRatingData();
        }

        function loadRatingData() {
            let savedRatings = JSON.parse(localStorage.getItem('vynzo_ratings_data') || '{"totalScore": 67, "votes": 14}');
            let userVoted = parseInt(localStorage.getItem('vynzo_user_voted') || '0');

            let avg = (savedRatings.totalScore / savedRatings.votes).toFixed(1);
            let avgSpan = document.getElementById("avgRating");
            let votesSpan = document.getElementById("totalVotes");

            if(avgSpan) avgSpan.innerText = avg;
            if(votesSpan) votesSpan.innerText = savedRatings.votes;

            let starElements = document.querySelectorAll('.stars-container .star');
            starElements.forEach((star, index) => {
                if (index < userVoted) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function extractVideoID(input) {
            if (!input) return null;
            let cleanInput = input.trim();
            let regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            let match = cleanInput.match(regExp);
            if (match && match[1]) return match[1];
            if (cleanInput.length === 11) return cleanInput;
            return null;
        }

        function playVideoFromInput() {
            let vInput = document.getElementById("videoUrl");
            let inputVal = vInput ? vInput.value : "";
            let videoID = extractVideoID(inputVal);
            if (videoID) {
                playVideo(videoID);
                let newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?v=' + videoID;
                window.history.pushState({path: newUrl}, '', newUrl);
            } else {
                alert("Ghalat link! Baraye meharbani theek YouTube link dalein.");
            }
        }

        function playVideo(videoID) {
            currentVideoID = videoID;
            let wrapper = document.getElementById("wrapper");
            let container = document.getElementById("videoContainer");
            let loader = document.getElementById("videoLoader");

            if(wrapper) wrapper.style.display = "block";
            if(loader) loader.style.display = "block";

            let iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&controls=1`;
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;

            iframe.onload = function() {
                if(loader) loader.style.display = "none";
            };

            let oldIframe = container.querySelector('iframe');
            if (oldIframe) oldIframe.remove();
            if(container) container.appendChild(iframe);
        }

        function shareVideo() {
            if (!currentVideoID) {
                alert("Pehle koi video chalayein!");
                return;
            }
            let shareableLink = window.location.protocol + "//" + window.location.host + window.location.pathname + '?v=' + currentVideoID;
            navigator.clipboard.writeText(shareableLink).then(() => {
                alert("Video ka shareable link copy ho gaya!");
            });
        }

        function downloadVideo() {
            if (!currentVideoID) {
                alert("Pehle koi video chalayein!");
                return;
            }
            alert("Video download shuru ho rahi hai...");
            let anchor = document.createElement('a');
            anchor.href = `https://www.youtube.com/watch?v=${currentVideoID}`;
            anchor.target = "_blank";
            anchor.download = `VynzoTube_${currentVideoID}.mp4`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        }

        function toggleLike() {
            let btn = document.getElementById("likeBtn");
            let countSpan = document.getElementById("likeCount");
            if(!countSpan) return;
            let count = parseInt(countSpan.innerText);
            if (!isLiked) {
                isLiked = true;
                if(btn) btn.classList.add("liked");
                countSpan.innerText = count + 1;
            } else {
                isLiked = false;
                if(btn) btn.classList.remove("liked");
                countSpan.innerText = count - 1;
            }
        }
    </script>
</body>
    </html>
