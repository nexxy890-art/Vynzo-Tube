<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>
    <style>
        @keyframes cinemaNeon {
            0% { background: #05000a; filter: hue-rotate(0deg); }
            33% { background: #000a08; filter: hue-rotate(120deg); }
            66% { background: #0a0005; filter: hue-rotate(240deg); }
            100% { background: #05000a; filter: hue-rotate(360deg); }
        }
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #ffffff;
            background-color: #05000a;
            animation: cinemaNeon 15s infinite linear;
            position: relative;
            overflow-x: hidden;
        }
        /* Poore background mein Cinematic Glow Effect */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255, 0, 128, 0.25), rgba(0, 240, 255, 0.2), transparent 70%);
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 6s infinite alternate ease-in-out;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 1; }
        }

        h1 {
            color: #ff007f;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.8), 0 0 40px rgba(0, 240, 255, 0.5);
            letter-spacing: 1.5px;
        }
        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-container {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 80%;
            max-width: 400px;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #ff007f;
            border-radius: 12px;
            background-color: rgba(10, 0, 15, 0.85);
            color: #fff;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        button {
            padding: 14px 22px;
            font-size: 14px;
            background-color: #ff007f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            transition: 0.2s;
        }
        button:hover {
            background-color: #d9006b;
        }
        .video-wrapper {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            background: rgba(15, 5, 25, 0.8);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(255, 0, 127, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
        }
        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-custom {
            background: rgba(26, 0, 35, 0.9);
            border: 1px solid #ff007f;
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            text-decoration: none;
        }
        .btn-custom:hover {
            background: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }
        .share-btn {
            border-color: #00f0ff;
            background: rgba(0, 30, 40, 0.9);
        }
        .share-btn:hover {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px #00f0ff;
        }
        .like-btn.liked {
            background: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
</head>
<body>

    <h1>Vynzo-Tube</h1>
    <p>Cinematic Neon Experience - YouTube Video Player</p>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTube ka link yahan paste karein...">
        <button onclick="playVideoFromInput()">Video Chalayein</button>
    </div>

    <div class="video-wrapper" id="wrapper" style="display:none;">
        <div class="video-box" id="videoContainer"></div>
        
        <div class="action-bar">
            <button class="btn-custom like-btn" id="likeBtn" onclick="toggleLike()">
                ♥️ Like <span id="likeCount">0</span>
            </button>
            <button class="btn-custom share-btn" onclick="shareVideo()">
                🔗 Share / Copy Link
            </button>
            <a id="downloadBtn" href="#" target="_blank" class="btn-custom" style="border-color: #00f0ff;">
                ⬇️ Download
            </a>
        </div>
    </div>

    <script>
        let isLiked = false;
        let currentVideoID = "";

        // Page load hote hi check karega ke kya link mein koi shared video ID hai ya nahi
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedID = urlParams.get('v');
            if (sharedID) {
                document.getElementById("videoUrl").value = sharedID;
                playVideo(sharedID);
            }
        };

        function extractVideoID(input) {
            if (!input) return null;
            let cleanInput = input.trim();
            let regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            let match = cleanInput.match(regExp);
            if (match && match[1]) return match[1];
            if (cleanInput.length === 11) return cleanInput;
            return null;
        }

        function playVideoFromInput() {
            let inputVal = document.getElementById("videoUrl").value;
            let videoID = extractVideoID(inputVal);
            if (videoID) {
                // URL ko update kar dega bina page refresh kiye taake share link ban jaye
                window.history.pushState({}, '', `?v=${videoID}`);
                playVideo(videoID);
            } else {
                alert("Ghalat link! Baraye meharbani theek YouTube link dalein.");
            }
        }

        function playVideo(videoID) {
            currentVideoID = videoID;
            let wrapper = document.getElementById("wrapper");
            let container = document.getElementById("videoContainer");
            let downloadBtn = document.getElementById("downloadBtn");

            wrapper.style.display = "block";
            downloadBtn.href = `https://www.ssyoutube.com/watch?v=${videoID}`;
            
            container.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }

        function shareVideo() {
            if (!currentVideoID) {
                alert("Pehle koi video chalayein!");
                return;
            }
            let shareableLink = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Vynzo-Tube Video',
                    text: 'Yeh video Vynzo-Tube par dekhein:',
                    url: shareableLink,
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareableLink).then(() => {
                    alert("Link copy ho gaya! Ab aap ise kisi ko bhi share kar sakte hain.");
                });
            }
        }

        function toggleLike() {
            let btn = document.getElementById("likeBtn");
            let countSpan = document.getElementById("likeCount");
            let count = parseInt(countSpan.innerText);

            if (!isLiked) {
                isLiked = true;
                btn.classList.add("liked");
                countSpan.innerText = count + 1;
            } else {
                isLiked = false;
                btn.classList.remove("liked");
                countSpan.innerText = count - 1;
            }
        }
    </script>

</body>
        </html>
