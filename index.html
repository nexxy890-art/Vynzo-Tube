<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff0000;
            margin-bottom: 5px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .input-container {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #222;
            color: #fff;
            outline: none;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-box {
            width: 100%;
            max-width: 560px;
            aspect-ratio: 16 / 9;
            background-color: #ffffff;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .placeholder-text {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Vynzo-Tube</h1>
    <p>Apni pasand ki YouTube video ka link yahan paste karein</p>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="https://youtu.be/...">
        <button onclick="playVideo()">Video Chalayein</button>
    </div>

    <div class="video-box" id="videoContainer">
        <span class="placeholder-text">Yahan video chalegi</span>
    </div>

    <script>
        function extractVideoID(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function playVideo() {
            let url = document.getElementById("videoUrl").value;
            let videoID = extractVideoID(url);
            let container = document.getElementById("videoContainer");

            if (videoID) {
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                alert("Ghalat link! Baraye meharbani theek YouTube link dalein.");
            }
        }
    </script>

</body>
    </html>
