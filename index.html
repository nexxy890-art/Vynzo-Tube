<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>
    <style>
        /* Background Cinematic Neon Movement */
        @keyframes bgNeonMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        body {
            margin: 0;
            padding: 20px 20px 40px 20px;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #ffffff;
            background: linear-gradient(135deg, #05000a, #001a1a, #1a001a, #05000a);
            background-size: 400% 400%;
            animation: bgNeonMove 12s ease infinite;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Free Fire Style Lobby Ping Indicator on Top-Right Corner */
        .ping-indicator {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
        }
        .ping-icon {
            font-size: 16px;
        }

        /* Vynzo-Tube Text with Red Neon Glow */
        h1 {
            font-size: 32px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
        }
        h1 span {
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
        }
        p {
            color: #bbb;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-container {
            margin-bottom: 25px;
            width: 100%;
        }
        input[type="text"] {
            width: 80%;
            max-width: 400px;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 12px;
            background-color: #121212;
            color: #fff;
            outline: none;
        }
        button {
            padding: 14px 22px;
            font-size: 14px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
            transition: 0.2s;
        }
        button:hover {
            background-color: #cc0000;
        }

        /* Video wrapper styling */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            background: #111;
            border-radius: 16px;
            padding: 15px;
            z-index: 1;
        }

        /* True Car-Style Rainbow Border Beam Loop */
        .video-wrapper::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 19px;
            background: linear-gradient(90deg, #00f0ff, #0077ff, #7928ca, #ff007f, #39ff14, #00f0ff);
            background-size: 400% 400%;
            z-index: -1;
            animation: rainbowCarRun 3s linear infinite;
        }

        @keyframes rainbowCarRun {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loading Spinner inside video box */
        .loader {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 3;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 4;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            z-index: 2;
        }
        .btn-custom {
            background: #1c1c1c;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            text-decoration: none;
        }
        .btn-custom:hover {
            background: #333;
            border-color: #777;
        }
        .like-btn.liked {
            background: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        /* Visitor Counter Badge at the absolute bottom */
        .visitor-counter {
            margin-top: auto;
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(18, 18, 18, 0.9);
            border: 1px solid #00f0ff;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            font-size: 14px;
            color: #fff;
        }
        .visitor-counter span {
            color: #00f0ff;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Free Fire Style Lobby Ping Indicator -->
    <div class="ping-indicator" id="pingIndicator">
        <span class="ping-icon" id="pingIcon">📶</span>
        <span id="pingText" style="color: #ffffff;">Checking...</span>
    </div>

    <h1>Vynzo<span>-Tube</span></h1>
    <p>Smooth Cinematic Neon Experience</p>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTube ka link yahan paste karein...">
        <button onclick="playVideoFromInput()">Video Chalayein</button>
    </div>

    <div class="video-wrapper" id="wrapper" style="display:none;">
        <div class="video-box" id="videoContainer">
            <div class="loader" id="videoLoader"></div>
        </div>
        
        <div class="action-bar">
            <button class="btn-custom like-btn" id="likeBtn" onclick="toggleLike()">
                ❤️ Like <span id="likeCount">0</span>
            </button>
            <button class="btn-custom" onclick="shareVideo()">
                🔗 Share / Copy Link
            </button>
            <a id="downloadBtn" href="#" target="_blank" class="btn-custom">
                📥 Download
            </a>
        </div>
    </div>

    <!-- Live Visitor Counter Badge at the very bottom -->
    <div class="visitor-counter">
        🎭 Total Visitors: <span id="visitCount">1</span>
    </div>

    <script>
        let isLiked = false;
        let currentVideoID = "";

        window.onload = function() {
            // Check Network Ping continuously
            checkNetworkSpeed();
            setInterval(checkNetworkSpeed, 4000);

            // Check URL for shared video
            const urlParams = new URLSearchParams(window.location.search);
            const sharedID = urlParams.get('v');
            if (sharedID) {
                document.getElementById("videoUrl").value = sharedID;
                playVideo(sharedID);
            }

            // Real Live Visitor Counter
            fetch('https://api.counterapi.dev/v1/vynzotube/visits/up')
                .then(response => response.json())
                .then(data => {
                    if (data && data.count !== undefined) {
                        document.getElementById("visitCount").innerText = data.count;
                    }
                })
                .catch(() => {
                    let localVisits = localStorage.getItem('vynzo_visits');
                    if (!localVisits) { localVisits = 1; } 
                    else { localVisits = parseInt(localVisits) + 1; }
                    localStorage.setItem('vynzo_visits', localVisits);
                    document.getElementById("visitCount").innerText = localVisits;
                });
        };

        // Network Speed / Ping Checker (Free Fire Lobby Style)
        function checkNetworkSpeed() {
            const pText = document.getElementById("pingText");
            const pIcon = document.getElementById("pingIcon");

            if (!navigator.onLine) {
                pText.innerText = "Offline";
                pText.style.color = "#ff0000";
                return;
            }

            let startTime = new Date().getTime();
            // Ping test using a tiny image request
            fetch('https://www.google.com/favicon.ico?_=' + startTime, { mode: 'no-cors' })
                .then(() => {
                    let duration = new Date().getTime() - startTime;
                    if (duration < 250) {
                        pText.innerText = "Fast (" + duration + "ms)";
                        pText.style.color = "#ffffff"; // White for smooth/fast
                    } else if (duration < 600) {
                        pText.innerText = "Normal (" + duration + "ms)";
                        pText.style.color = "#ffff00"; // Yellow for moderate/normal
                    } else {
                        pText.innerText = "Slow (" + duration + "ms)";
                        pText.style.color = "#ff0000"; // Red for slow
                    }
                })
                .catch(() => {
                    pText.innerText = "Poor Net";
                    pText.style.color = "#ff0000"; // Red if request fails
                });
        }

        function extractVideoID(input) {
            if (!input) return null;
            let cleanInput = input.trim();
            let regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            let match = cleanInput.match(regExp);
            if (match && match[1]) return match[1];
            if (cleanInput.length === 11) return cleanInput;
            return null;
        }

        function playVideoFromInput() {
            let inputVal = document.getElementById("videoUrl").value;
            let videoID = extractVideoID(inputVal);
            if (videoID) {
                window.history.pushState({}, '', `?v=${videoID}`);
                playVideo(videoID);
            } else {
                alert("Ghalat link! Baraye meharbani theek YouTube link dalein.");
            }
        }

        function playVideo(videoID) {
            currentVideoID = videoID;
            let wrapper = document.getElementById("wrapper");
            let container = document.getElementById("videoContainer");
            let loader = document.getElementById("videoLoader");
            let downloadBtn = document.getElementById("downloadBtn");

            wrapper.style.display = "block";
            downloadBtn.href = `https://www.ssyoutube.com/watch?v=${videoID}`;
            
            // Show loader while video iframe loads
            loader.style.display = "block";

            // Create iframe
            let iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1`;
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;

            iframe.onload = function() {
                loader.style.display = "none"; // Hide loader when video loads successfully
            };

            // Clear previous iframe if any and append new one with loader
            let oldIframe = container.querySelector('iframe');
            if (oldIframe) oldIframe.remove();
            container.appendChild(iframe);
        }

        function shareVideo() {
            if (!currentVideoID) {
                alert("Pehle koi video chalayein!");
                return;
            }
            let shareableLink = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Vynzo-Tube Video',
                    text: 'Yeh video Vynzo-Tube par dekhein:',
                    url: shareableLink,
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareableLink).then(() => {
                    alert("Link copy ho gaya! Ab aap ise kisi ko bhi share kar sakte hain.");
                });
            }
        }

        function toggleLike() {
            let btn = document.getElementById("likeBtn");
            let countSpan = document.getElementById("likeCount");
            let count = parseInt(countSpan.innerText);

            if (!isLiked) {
                isLiked = true;
                btn.classList.add("liked");
                countSpan.innerText = count + 1;
            } else {
                isLiked = false;
                btn.classList.remove("liked");
                countSpan.innerText = count - 1;
            }
        }
    </script>

</body>
    </html>
