<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynzo-Tube</title>

    <!-- Firebase SDKs for Real-time Cloud Database -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @keyframes neonRainbow {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            20% { border-color: #ff9900; box-shadow: 0 0 15px #ff9900; }
            40% { border-color: #33cc33; box-shadow: 0 0 15px #33cc33; }
            60% { border-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
            80% { border-color: #cc00ff; box-shadow: 0 0 15px #cc00ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        @keyframes bgNeonMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body {
            margin: 0;
            padding: 40px 20px 60px 20px;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #ffffff;
            background: linear-gradient(135deg, #05000a, #001a1a, #1a001a, #05000a);
            background-size: 400% 400%;
            animation: bgNeonMove 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Ping Indicator Top-Right (Free Fire Style Numbers) */
        .ping-indicator {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-container {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        /* YouTube Video Search Bar with Neon Rainbow Box */
        .top-search-container {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            gap: 8px;
        }
        .top-search-container input {
            flex: 1;
            padding: 14px 18px;
            font-size: 14px;
            animation: neonRainbow 6s infinite;
            border: 2px solid #ff0000;
            border-radius: 14px;
            background-color: rgba(18, 18, 18, 0.95);
            color: #fff;
            outline: none;
        }
        .top-search-container button {
            padding: 14px 22px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        h1 {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }
        h1 span {
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000;
        }
        p {
            color: #bbb;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #111;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            animation: neonRainbow 6s infinite;
            border: 2px solid #33cc33;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 3;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 4;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-custom {
            background: #1c1c1c;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .like-btn.liked {
            background: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        /* Permanent User & Comment Section Box */
        .comments-section {
            width: 100%;
            margin-top: 25px;
            background: rgba(18, 18, 18, 0.95);
            animation: neonRainbow 6s infinite;
            border: 2px solid #00f0ff;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            text-align: left;
        }
        .comments-section h3 {
            margin-top: 0;
            font-size: 16px;
            color: #00f0ff;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-tag-box {
            background: #121212;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-tag-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00f0ff;
            font-weight: bold;
            font-size: 13px;
            outline: none;
        }
        .comment-input-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .comment-input-box textarea {
            padding: 10px 12px;
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            font-family: Arial, sans-serif;
            resize: none;
            height: 50px;
        }
        .comment-input-box button {
            background: #00f0ff;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .comments-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .comment-item {
            background: #111;
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid #ff0000;
            font-size: 13px;
        }
        .comment-user {
            color: #00f0ff;
            font-weight: bold;
            margin-right: 6px;
        }

        .visitor-counter {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(18, 18, 18, 0.9);
            animation: neonRainbow 6s infinite;
            border: 2px solid #00f0ff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 14px;
            color: #fff;
        }
        .visitor-counter span {
            color: #00f0ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Ping Indicator Top-Right -->
    <div class="ping-indicator" id="pingIndicator">
        <span id="pingIcon">📶</span>
        <span id="pingText" style="color: #ffffff;">45ms</span>
    </div>

    <div class="main-container">
        <div class="top-search-container">
            <input type="text" id="videoUrl" placeholder="YouTube video link ya ID search karein...">
            <button onclick="playVideoFromInput()">Search</button>
        </div>

        <h1>Vynzo<span>-Tube</span></h1>
        <p>Smooth Cinematic Neon Experience</p>

        <div class="video-wrapper" id="wrapper" style="display:none;">
            <div class="video-box" id="videoContainer">
                <div class="loader" id="videoLoader"></div>
            </div>
            
            <div class="action-bar">
                <button class="btn-custom like-btn" id="likeBtn" onclick="toggleLike()">
                    ❤️ Like <span id="likeCount">0</span>
                </button>
                <button class="btn-custom" onclick="shareVideo()">
                    🔗 Share Link
                </button>
                <a id="downloadBtn" href="#" target="_blank" class="btn-custom">
                    📥 Download
                </a>
            </div>

            <!-- Permanent Username & Comment Section -->
            <div class="comments-section">
                <h3>
                    <span>💬 Comments (<span id="commentCount">0</span>)</span>
                    <span style="font-size: 11px; color: #aaa; font-weight: normal;">Live Cloud Sync</span>
                </h3>

                <!-- Permanent Username Bar -->
                <div class="user-tag-box">
                    <span style="font-size: 12px; color: #888;">👤 Naam:</span>
                    <input type="text" id="permanentUsername" placeholder="Apna permanent naam likhein..." oninput="savePermanentUsername()">
                </div>

                <div class="comment-input-box">
                    <textarea id="commentText" placeholder="Apna comment likhein..."></textarea>
                    <button onclick="postComment()">Comment Bhejo</button>
                </div>
                <div class="comments-list" id="commentsList">
                    <div style="color: #666; text-align: center; font-size: 12px;">Comments load ho rahe hain...</div>
                </div>
            </div>
        </div>

        <div class="visitor-counter">
            🎭 Total Visitors: <span id="visitCount">1</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_DummyKeyForVynzoTubeCloud99",
            authDomain: "vynzotube-comments.firebaseapp.com",
            projectId: "vynzotube-comments",
            storageBucket: "vynzotube-comments.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef"
        };

        let db = null;
        try {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            }
        } catch (e) {
            console.log("Firebase fallback mode");
        }

        let currentVideoID = "";
        let isLiked = false;
        let unsubscribeComments = null;

        window.onload = function() {
            try {
                let savedName = localStorage.getItem('vynzo_permanent_username') || "Wardan";
                let nameInput = document.getElementById("permanentUsername");
                if(nameInput) nameInput.value = savedName;

                const urlParams = new URLSearchParams(window.location.search);
                let vParam = urlParams.get('v');
                if (vParam) {
                    playVideo(vParam);
                    let vInput = document.getElementById("videoUrl");
                    if(vInput) vInput.value = "https://youtu.be/" + vParam;
                }

                let visitKey = 'vynzo_visit_counted_session';
                let visits = parseInt(localStorage.getItem('vynzo_visit_total') || '124');
                if (!sessionStorage.getItem(visitKey)) {
                    visits += 1;
                    localStorage.setItem('vynzo_visit_total', visits);
                    sessionStorage.setItem(visitKey, 'true');
                }
                let visitSpan = document.getElementById("visitCount");
                if(visitSpan) visitSpan.innerText = visits;

                updatePing();
                setInterval(updatePing, 4000);
            } catch(e) {}
        };

        function savePermanentUsername() {
            let nameInput = document.getElementById("permanentUsername");
            if (nameInput) {
                let val = nameInput.value.trim();
                if (val !== "") {
                    localStorage.setItem('vynzo_permanent_username', val);
                }
            }
        }

        function updatePing() {
            let pingText = document.getElementById("pingText");
            let pingIcon = document.getElementById("pingIcon");
            if (!pingText) return;

            if (!navigator.onLine) {
                pingText.innerText = "999+ ms";
                pingText.style.color = "#ff0000";
                if(pingIcon) pingIcon.innerText = "⚠️";
                return;
            }

            let startTime = Date.now();
            fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' })
            .then(() => {
                let duration = Date.now() - startTime;
                pingText.innerText = duration + "ms";
                if(pingIcon) pingIcon.innerText = "📶";
                if (duration < 250) {
                    pingText.style.color = "#ffffff";
                } else {
                    pingText.style.color = "#ffff00";
                }
            })
            .catch(() => {
                pingText.innerText = "999+ ms";
                pingText.style.color = "#ff0000";
                if(pingIcon) pingIcon.innerText = "⚠️";
            });
        }

        function extractVideoID(input) {
            if (!input) return null;
            let cleanInput = input.trim();
            let regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            let match = cleanInput.match(regExp);
            if (match && match[1]) return match[1];
            if (cleanInput.length === 11) return cleanInput;
            return null;
        }

        function playVideoFromInput() {
            let vInput = document.getElementById("videoUrl");
            let inputVal = vInput ? vInput.value : "";
            let videoID = extractVideoID(inputVal);
            if (videoID) {
                playVideo(videoID);
                let newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?v=' + videoID;
                window.history.pushState({path: newUrl}, '', newUrl);
            } else {
                alert("Ghalat link! Baraye meharbani theek YouTube link dalein.");
            }
        }

        function playVideo(videoID) {
            currentVideoID = videoID;
            let wrapper = document.getElementById("wrapper");
            let container = document.getElementById("videoContainer");
            let loader = document.getElementById("videoLoader");
            let downloadBtn = document.getElementById("downloadBtn");

            if(wrapper) wrapper.style.display = "block";
            if(downloadBtn) downloadBtn.href = `https://www.ssyoutube.com/watch?v=${videoID}`;
            if(loader) loader.style.display = "block";

            let iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&controls=1`;
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;

            iframe.onload = function() {
                if(loader) loader.style.display = "none";
            };

            let oldIframe = container.querySelector('iframe');
            if (oldIframe) oldIframe.remove();
            if(container) container.appendChild(iframe);

            loadCommentsRealtime(videoID);
        }

        function postComment() {
            let nameInput = document.getElementById("permanentUsername");
            let textInput = document.getElementById("commentText");
            
            let name = nameInput ? nameInput.value.trim() : "";
            let text = textInput ? textInput.value.trim() : "";

            if (!name) {
                alert("Baraye meharbani apna permanent naam likhein!");
                return;
            }
            if (!text) {
                alert("Comment likhna zaroori hai!");
                return;
            }

            localStorage.setItem('vynzo_permanent_username', name);

            let commentData = {
                videoID: currentVideoID,
                name: name,
                text: text,
                timestamp: Date.now()
            };

            if (db) {
                db.collection("comments").add(commentData)
                .then(() => {
                    textInput.value = "";
                })
                .catch(() => {
                    alert("Comment save karte waqt error aaya.");
                });
            } else {
                alert("Database connected nahi hai!");
            }
        }

        function loadCommentsRealtime(videoID) {
            let commentsListDiv = document.getElementById("commentsList");
            let commentCountSpan = document.getElementById("commentCount");
            if (!commentsListDiv) return;

            if (unsubscribeComments) {
                unsubscribeComments();
            }

            if (db) {
                unsubscribeComments = db.collection("comments")
                    .where("videoID", "==", videoID)
                    .orderBy("timestamp", "asc")
                    .onSnapshot((snapshot) => {
                        commentsListDiv.innerHTML = "";
                        if (snapshot.empty) {
                            commentsListDiv.innerHTML = '<div style="color: #666; text-align: center; font-size: 12px;">Abhi koi comment nahi hai. Pehla comment aap karein!</div>';
                            if(commentCountSpan) commentCountSpan.innerText = "0";
                            return;
                        }

                        if(commentCountSpan) commentCountSpan.innerText = snapshot.size;

                        snapshot.forEach((doc) => {
                            let c = doc.data();
                            commentsListDiv.innerHTML += `
                                <div class="comment-item">
                                    <span class="comment-user">${escapeHtml(c.name)}:</span> 
                                    <span>${escapeHtml(c.text)}</span>
                                </div>
                            `;
                        });
                        commentsListDiv.scrollTop = commentsListDiv.scrollHeight;
                    }, (error) => {
